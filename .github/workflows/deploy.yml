# .github/workflows/deploy.yml
name: Deploy to Private EC2 via SSM

on:
  push:
    branches:
      - main  # mainブランチにPushされたら実行

# OIDC連携のための必須設定
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリのコードをチェックアウト（このAction環境に持ってくる）
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. OIDCを使ってAWSに安全にログイン
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.ARN_ROLE_2 }}
          aws-region: ap-northeast-1

      # 3. SSMを使ってPrivate EC2にコマンドを送信し、デプロイを実行！
      - name: Deploy via AWS SSM
        run: |
          # タグ名からEC2のインスタンスIDを検索（IPアドレスではなくIDを使います）
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=*asg-web-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          # EC2が起動していない場合はスキップ（コスト節約アーキテクチャ対応）
          if [ -z "$INSTANCE_IDS" ]; then
            echo "起動中のEC2インスタンスが見つかりません。デプロイをスキップします。"
            exit 0
          fi

          echo "ターゲットインスタンス: $INSTANCE_IDS"

          # SSM Run Commandで実行させるコマンドを定義
          # user_dataで初回cloneされている前提で、ディレクトリに移動 -> pull -> 再起動 を行います
          COMMANDS='[
            "cd /home/ubuntu/",
            "if [ ! -d \"Monitoring-docker-project-2\" ];then ",
            "   echo \"初期デプロイ：リポジトリをクローンします\"",
            "   git clone \"https://github.com/minseong99/Monitoring-docker-project-2.git\"",
            "fi",
            "cd Monitoring-docker-project-2",
            "echo \"最新コードを取得します\"",
            "git pull origin main",
            "echo \"環境変数を設定します\"",
            "echo \"GRAFANA_ADMIN_USER=admin\" > .env",
            "echo \"GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}\" >> .env",
            "docker-compose down -v",
            "docker-compose up -d"
          ]'

          # SSMコマンドを送信
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$COMMANDS" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID "
          echo "デプロイコマンドを送信しました！"